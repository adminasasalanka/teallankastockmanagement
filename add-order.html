<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teal Lanka - Add Order</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 12px; background-color: #f1f3f5; }
        .top-nav { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; }
        .nav-btn { text-decoration: none; padding: 10px 14px; border-radius: 6px; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .nav-btn.green-btn { background: #00875a; color: white; }
        .nav-btn.blue-btn { background: #007bff; color: white; }
        
        .form-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 650px; margin: 0 auto; border-top: 5px solid #00875a; }
        .form-card h2 { margin: 0 0 15px 0; font-size: 20px; color: #1e3d59; text-align: center; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-weight: bold; font-size: 13px; color: #495057; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 15px; width: 100%; box-sizing: border-box; }
        
        /* 🔒 Disabled field style */
        .form-group input:disabled { background-color: #e9ecef; color: #495057; cursor: not-allowed; border: 1px solid #ced4da; font-weight: bold; }
        .status-msg { font-size: 12px; font-weight: bold; margin-top: 2px; min-height: 16px; }
        
        .submit-btn { background: #00875a; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 15px; }

        @media (orientation: landscape) {
            .form-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="index.html" class="nav-btn green-btn">Dashboard Summary</a>
        <a href="add-order.html" class="nav-btn blue-btn">Add Order</a>
        <a href="orders-list.html" class="nav-btn green-btn">View Active Orders</a>
        <a href="shipped-history.html" class="nav-btn green-btn">View Shipped History</a>
    </div>
    <div class="form-card">
        <h2>Add New Order</h2>
        <form id="orderForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Plant Code</label>
                    <input type="text" id="plantCode" required placeholder="Type Code (e.g. B01)">
                    <div id="codeStatus" class="status-msg"></div>
                </div>
                <div class="form-group">
                    <label>Variety Name</label>
                    <input type="text" id="variety" placeholder="Waiting for Plant Code..." disabled required>
                </div>
                <div class="form-group"><label>Company Name</label><input type="text" id="companyName" required></div>
                <div class="form-group"><label>Order Month</label><input type="month" id="orderMonth" required></div>
                <div class="form-group"><label>Delivery Period</label><select id="deliveryPeriod"><option value="1st-15th">1st - 15th Half</option><option value="16th-End">16th - End Half</option></select></div>
                <div class="form-group"><label>Ordered Quantity</label><input type="number" id="orderedQty" required></div>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Save Order</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        
        // 🔑 ඔයාගේ ඩේටාබේස් Config දෙක මම හරියටම දාලා තියෙන්නේ
        const prodConfig = { apiKey: "AIzaSyBRLKdJqdC4kwT4qPvHBPjf1vX2viSBxqg", authDomain: "teal-lanka-daily-production.firebaseapp.com", projectId: "teal-lanka-daily-production" };
        const stockConfig = { apiKey: "AIzaSyCNsHcWA8LYxK9d2kXYupfHoQfO0j0IOIc", authDomain: "stock-management-b898e.firebaseapp.com", projectId: "stock-management-b898e" };
        
        const dbProd = getFirestore(initializeApp(prodConfig, "prodApp"));
        const dbStock = getFirestore(initializeApp(stockConfig, "stockApp"));

        document.getElementById('orderMonth').value = new Date().toISOString().substring(0, 7);

        // ⚡ Plant Code එක ගහලා ඉවර වුණ සැනින් (Input change එකේදී) Direct Document lookup එකක් කරනවා
        document.getElementById('plantCode').addEventListener('change', async (e) => {
            const rawCode = e.target.value.trim();
            const typedCode = rawCode.toUpperCase(); // Code එක Capital කරනවා (B01, TL-01 වගේ)
            const varietyInput = document.getElementById('variety');
            const statusDiv = document.getElementById('codeStatus');

            if (!typedCode) {
                varietyInput.value = ""; varietyInput.disabled = true;
                statusDiv.innerText = ""; return;
            }

            statusDiv.style.color = "#007bff";
            statusDiv.innerText = `Searching for Code: ${typedCode}...`;
            varietyInput.value = "";

            try {
                // 🎯 ඔයාගේ `variety_upload.html` එකේ විදිහටම "Plants" Collection එකෙන් කෙලින්ම Document ID එකෙන් සොයනවා
                const docRef = doc(dbProd, "Plants", typedCode);
                let docSnap = await getDoc(docRef);

                // සේෆ්ටි එකට, සමහරවිට ඩේටාබේස් එකේ Document ID එක Simple අකුරෙන් තිබුනොත් (b01) ඒකත් චෙක් කරනවා
                if (!docSnap.exists() && rawCode !== typedCode) {
                    const docRefSimple = doc(dbProd, "Plants", rawCode);
                    docSnap = await getDoc(docRefSimple);
                }

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    // 💡 ඔයාගේ ඩේටාබේස් එකේ තියෙන්නේ `varietyName` කියන ෆීල්ඩ් එක
                    if (data.varietyName) {
                        varietyInput.value = data.varietyName.trim();
                        varietyInput.disabled = true; // නම වෙනස් කරන්න බැරි වෙන්න බ්ලොක් කරනවා
                        statusDiv.style.color = "#00875a";
                        statusDiv.innerText = "✓ Variety Auto-filled From Database";
                    } else {
                        throw new Error("Document exists but varietyName field is missing");
                    }
                } else {
                    // ඩේටාබේස් එකේම නැති අලුත් කේතයක් නම් ටයිප් කරන්න ඉඩ දෙනවා
                    varietyInput.disabled = false;
                    statusDiv.style.color = "#e67e22";
                    statusDiv.innerText = "⚠ Code not found in 'Plants'. Type Variety manually.";
                    varietyInput.focus();
                }
            } catch (err) {
                console.error("Lookup Error:", err);
                varietyInput.disabled = false;
                statusDiv.style.color = "#e03131";
                statusDiv.innerText = "❌ Connection error. Type variety manually.";
            }
        });

        // 💾 Save Order (Stock Management ඩේටාබේස් එකට සේව් කිරීම)
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); 
            btn.disabled = true; btn.innerText = "Saving...";
            
            const pCode = document.getElementById('plantCode').value.trim().toUpperCase();
            const vName = document.getElementById('variety').value.trim();

            try {
                await addDoc(collection(dbStock, "orders"), {
                    companyName: document.getElementById('companyName').value.trim(),
                    plantCode: pCode,
                    variety: vName, // අනිත් පිටු වලට මැච් වෙන්න 'variety' කියලාම සේව් කරනවා
                    orderMonth: document.getElementById('orderMonth').value,
                    deliveryPeriod: document.getElementById('deliveryPeriod').value,
                    orderedQty: parseInt(document.getElementById('orderedQty').value),
                    status: "Pending",
                    timestamp: new Date().toISOString()
                });
                
                alert("Order Saved successfully!"); 
                document.getElementById('orderForm').reset();
                document.getElementById('orderMonth').value = new Date().toISOString().substring(0, 7);
                document.getElementById('variety').disabled = true;
                document.getElementById('codeStatus').innerText = "";
            } catch (err) { 
                console.error(err); 
                alert("Error saving order!"); 
            } finally { 
                btn.disabled = false; 
                btn.innerText = "Save Order"; 
            }
        });
    </script>
</body>
</html>
