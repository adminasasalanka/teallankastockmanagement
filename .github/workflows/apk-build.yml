name: Build HTML to APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create stockapp com.stockapp.teallanka TealLankaStock
        
        # ඔයාගේ repository එකේ තියෙන HTML/CSS ෆයිල් ටික Cordova එකේ www ෆෝල්ඩරයට කොපි කරනවා
        # (index.html එක ප්‍රධාන ෆෝල්ඩරයේම තියෙනවා කියා සිතා)
        rm -rf stockapp/www/*
        cp -r * stockapp/www/ || true
        
        cd stockapp
        cordova platform add android

    - name: Build Android APK
      run: |
        cd stockapp
        cordova build android --device

    - name: Upload APK Package
      uses: actions/upload-artifact@v4
      with:
        name: TealLanka-Stock-APK
        path: stockapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
