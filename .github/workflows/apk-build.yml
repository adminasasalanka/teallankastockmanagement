name: Build HTML to APK with Custom Icon

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        cordova create stockapp com.stockapp.teallanka TealLankaStock
        
        # HTML ෆයිල් ටික කොපි කිරීම
        rm -rf stockapp/www/*
        cp -r * stockapp/www/ || true
        
        cd stockapp
        cordova platform add android
        
        # ඔයා අප්ලෝඩ් කරපු icon.png එක ඇප් එකේ අයිකන් එක විදිහට config එකට එකතු කිරීම
        cp ../icon.png res/icon.png || true
        
        cat <<EOF > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.stockapp.teallanka" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>TealLanka Stock</name>
            <description>Teal Lanka Stock Management App</description>
            <author email="dev@callback.com" href="http://cordova.io">Teal Lanka Team</author>
            <content src="index.html" />
            <access origin="*" />
            <icon src="res/icon.png" />  </widget>
        EOF

    - name: Build Android APK
      run: |
        cd stockapp
        cordova build android --device

    - name: Upload APK Package
      uses: actions/upload-artifact@v4
      with:
        name: TealLanka-Stock-APK
        path: stockapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
